services:
  qdrant:
    image: qdrant/qdrant:latest       # 使用最新版本的 Qdrant 镜像
    container_name: local-rag-qdrant  # 设置容器名称
    ports:
      - "6333:6333"                   # 映射 Qdrant 的 API 端口
      - "6334:6334"                   # 映射 Qdrant 的 gRPC 端口       
    volumes:
      - ./qdrant_storage:/qdrant/storage # 持久化存储数据
